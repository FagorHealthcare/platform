# Loki datasource for the `pre` cluster.
#
# Perses uses the Prometheus-API plugin to drive Loki: LogQL metric
# queries (e.g. `rate(... [5m])`) speak the Prometheus query API at
# /loki/api/v1/query and /loki/api/v1/query_range, which Perses
# already knows how to consume.
#
# Mode is `proxy` (NOT `directUrl`):
#   - directUrl makes the browser hit the URL directly. Loki is on
#     the internal docker network — the browser cannot resolve it.
#   - proxy makes the Perses backend hit the URL on behalf of the
#     browser. The frontend calls /proxy/<datasource>/api/v1/...
#     and Perses forwards to the configured URL.
#
# The url ends in `/loki` because Perses then appends
# `/api/v1/query[_range]`, and Loki's Prometheus-compatible LogQL
# endpoints live under /loki/api/v1/... not under the root.
#
# No auth: Perses is on the same internal docker network as Loki, so
# it talks directly to it; the basic-auth gate at Caddy is only for
# external callers (Vector pushes, logcli queries from operators).
kind: GlobalDatasource
metadata:
  name: loki-pre
spec:
  default: true
  plugin:
    kind: PrometheusDatasource
    spec:
      proxy:
        kind: HTTPProxy
        spec:
          url: http://loki:3100/loki
