# =====================================================================
# Perses — dashboard server config.
#
# Storage: file-based (no DB). Datasources and dashboards are loaded
# from /etc/perses/provisioning/*.yaml on a 1-min poll.
#
# Auth: disabled at the Perses level. Caddy enforces basic-auth at the
# edge (same credential pair as Loki / Alertmanager).
#
# Reference: docs/observability-DESIGN.md
# =====================================================================

# Schemas — CUE definitions of panels, queries, datasources, variables.
# Bundled in the image at /etc/perses/cue/schemas. The default config
# inside the image references them; we re-state them here because we
# replace the whole config (rather than overlaying).
schemas:
  panels_path: /etc/perses/cue/schemas/panels
  queries_path: /etc/perses/cue/schemas/queries
  datasources_path: /etc/perses/cue/schemas/datasources
  variables_path: /etc/perses/cue/schemas/variables
  interval: 6h

# Files-based persistence — small footprint, no DB.
database:
  file:
    folder: /var/lib/perses
    extension: yaml

# Static provisioning of project, datasources, and dashboards. Two
# folders are listed because the source-of-truth for dashboards lives
# under platform/observability/ (rendered by render.py), while the
# manual project + datasource definitions live alongside this config.
provisioning:
  folders:
    - /etc/perses/provisioning   # manual: project + datasources
    - /etc/perses/dashboards     # generated by render.py (mounted from
                                 # platform/observability/perses/)
  interval: 1m
