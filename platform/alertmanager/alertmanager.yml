# =====================================================================
# Alertmanager — routing & deduplication for Loki Ruler alerts.
#
# Notifies #circupack via Slack incoming webhook. The webhook URL is
# read from /etc/alertmanager/slack-webhook.txt (gitignored, mounted
# into the container from platform/alertmanager/slack-webhook.txt on
# the droplet). Alertmanager re-reads the file on each notification —
# rotating the webhook is just `echo NEW > slack-webhook.txt`, no
# restart needed.
#
# UI is published at https://alerts.platform.fmd.fagorhealthcare.com
# behind Caddy basic-auth (same credential pair as Loki).
#
# Reference: docs/observability-DESIGN.md
# =====================================================================

global:
  resolve_timeout: 5m
  # File-based webhook URL keeps the secret out of git. Slack's incoming
  # webhook contains the channel routing — `channel:` here is decorative
  # in webhook mode but kept for readability.
  slack_api_url_file: /etc/alertmanager/slack-webhook.txt

route:
  group_by: ['alertname', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack'

receivers:
  - name: 'slack'
    slack_configs:
      - channel: '#alertas'
        send_resolved: true
        title: '{{ .Status | toUpper }} · {{ .CommonLabels.alertname }} · {{ .CommonLabels.cluster }}'
        text: |-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ if .Annotations.runbook }}runbook: {{ .Annotations.runbook }}{{ end }}
          {{ end }}
