# =====================================================================
# Platform-tier docker-compose stack.
#
# Runs on the dedicated Debian droplet provisioned by ../terraform/.
# Services:
#   - caddy        : TLS edge (Let's Encrypt) for *.platform.fmd.fagorhealthcare.com
#   - zot          : OCI registry (LOCAL disk on droplet, Trivy CVE scanning;
#                    nightly rclone mirror to DO Spaces handled by md-backup)
#   - loki         : log aggregator (S3 backend → DO Spaces, 365-day retention)
#   - alertmanager : routes/dedup alerts emitted by Loki Ruler
#   - perses       : LogQL dashboards (file-provisioned, no DB)
#
# Caddy is the ONLY service that publishes ports on the host. Zot and
# Loki are reachable only via the internal `platform` bridge network.
# Auth (htpasswd for Zot, basic-auth headers for Loki/Vector) is handled
# inside each service.
#
# Reference: docs/migration/06-platform-tier.md
# =====================================================================

networks:
  platform:
    driver: bridge

volumes:
  caddy_data:        # ACME certificates + state — persists across restarts
  caddy_config:      # Caddy autosaved/admin config
  loki_wal:          # Loki WAL + tsdb local index cache
  zot_rendered:      # Rendered (envsubst'd) zot config — written by init
  zot_data:          # OCI registry blobs + index. Local fs (CVE scanning
                     # requires real POSIX storage; S3 backend is rejected
                     # by Zot's validator). Mirrored nightly to Spaces by
                     # md-backup. See docs/migration/02-registry.md.
  alertmanager_data: # Silences + notification log. Ephemeral by nature
                     # (lost silences can be recreated); not Spaces-backed.
  perses_data:       # File-based Perses runtime cache. Source of truth is
                     # platform/observability/queries/, rendered into the
                     # provisioning mounts below.

services:
  # -------------------------------------------------------------------
  # Caddy — TLS edge. Reverse-proxies registry. and logs. virtual hosts
  # to Zot/Loki on the internal bridge. ACME (HTTP-01) on ports 80/443.
  # -------------------------------------------------------------------
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Static landing page for the apex vhost. Mount read-only — Caddy
      # only serves these files, never writes them. The path matches
      # `root * /srv/landing` in the Caddyfile.
      - ./landing:/srv/landing:ro
      # Loki has no built-in UI; serving a minimal LogQL explorer
      # at logs.platform.../ replaces the bare 404 that operators
      # hit when clicking through from the portal.
      - ./loki-landing:/srv/loki-landing:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - platform
    depends_on:
      zot:
        # Zot's published image is distroless (no wget/sh), so the only
        # honest gate we can apply here is "process started". Real health
        # is tested end-to-end via Caddy / curl from outside.
        condition: service_started
      loki:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
      perses:
        condition: service_started
      oauth2-proxy:
        condition: service_started
    healthcheck:
      # Caddy's admin API listens on 127.0.0.1:2019 (IPv4-only) inside the
      # container. busybox `wget` resolves `localhost` to ::1 first and gets
      # `connection refused`, so we hit the v4 address explicitly.
      test: ["CMD", "wget", "-q", "-O-", "-T", "5", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------
  # zot-config-render — init container.
  #
  # Zot does NOT do environment-variable substitution on its config file
  # natively. We render zot/config.json.tmpl through `envsubst` (from the
  # gettext package) into a named volume that Zot then reads read-only.
  #
  # Trade-off accepted: an init container adds one more moving part vs.
  # baking a wrapper into a custom Zot image. The init-container path is
  # picked because it (a) keeps us on the upstream-published Zot image
  # with no rebuild step, and (b) makes the substitution mechanic
  # explicit in this compose file rather than hidden in a Dockerfile.
  # -------------------------------------------------------------------
  zot-config-render:
    image: alpine:3.20
    env_file: .env
    volumes:
      - ./zot/config.json.tmpl:/in/config.json.tmpl:ro
      - zot_rendered:/out
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache gettext >/dev/null
        envsubst < /in/config.json.tmpl > /out/config.json
        chmod 0444 /out/config.json
        echo "rendered /out/config.json"
    restart: "no"

  # -------------------------------------------------------------------
  # Zot — OCI registry. LOCAL disk storage on the droplet, htpasswd auth,
  # Trivy CVE scanning extension. Only reachable via Caddy.
  #
  # Why local instead of S3-direct: Zot's validator hard-rejects CVE
  # scanning whenever any storageDriver is set (root or any subPath),
  # because Trivy's DB needs a real POSIX filesystem. The maintainer-
  # recommended pattern is local disk + nightly rclone mirror to S3 for
  # durability. See pillar 02 (docs/migration/02-registry.md).
  # -------------------------------------------------------------------
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.16
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      # /etc/zot is rw because we mount htpasswd as a nested file inside it;
      # Docker cannot create a nested mountpoint underneath a :ro mount.
      # Zot itself does not write to /etc/zot at runtime.
      - zot_rendered:/etc/zot
      - ./zot/htpasswd:/etc/zot/htpasswd:ro
      # Registry blobs live here — backed up nightly to Spaces by
      # md-spaces-mirror-cronjob. Capacity: ~30 GB on a 80 GB droplet
      # disk leaves ample headroom.
      - zot_data:/var/lib/registry
    networks:
      - platform
    depends_on:
      zot-config-render:
        condition: service_completed_successfully
    # No healthcheck: the upstream zot image is distroless (no wget/sh,
    # no curl). End-to-end health is monitored externally via Caddy.

  # -------------------------------------------------------------------
  # Loki — monolithic mode. S3-backed chunks (DO Spaces), tsdb index
  # local-then-shipped, 365-day retention via compactor. Only reachable
  # via Caddy.
  # -------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.5
    restart: unless-stopped
    env_file: .env
    command:
      - "-config.file=/etc/loki/local-config.yaml"
      - "-config.expand-env=true"
    expose:
      - "3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_wal:/loki
      # Loki Ruler reads alerting rules from this directory (per tenant
      # subdirectory; with auth_enabled: false the active tenant is `fake`).
      # Source: platform/observability/queries/, rendered by render.py.
      # `kill -s HUP loki` reloads rules without a full restart.
      - ./observability/ruler:/etc/loki/rules:ro
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "--timeout=5", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  # -------------------------------------------------------------------
  # Alertmanager — dedupes/routes alerts emitted by Loki Ruler. The
  # bootstrap config sends alerts to a `null` receiver (visible only in
  # the UI). To wire Slack: see platform/alertmanager/alertmanager.yml
  # for the commented-out template.
  # -------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    expose:
      - "9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Slack webhook URL — gitignored, droplet-local file. Rotating the
      # webhook is `echo NEW > slack-webhook.txt`; Alertmanager re-reads
      # the file per notification, no restart needed.
      - ./alertmanager/slack-webhook.txt:/etc/alertmanager/slack-webhook.txt:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://alerts.platform.fmd.fagorhealthcare.com"
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "--timeout=5", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------
  # Perses — LogQL dashboards. File-provisioned (no DB):
  #   - manual:    platform/perses/provisioning/      (project + datasources)
  #   - generated: platform/observability/perses/     (dashboards)
  # Both folders are listed in platform/perses/config.yaml under
  # provisioning.folders, polled every 1m.
  # -------------------------------------------------------------------
  perses:
    image: persesdev/perses:v0.50.2
    restart: unless-stopped
    # Perses runs as `nobody`. Compose-managed volumes are owned by root
    # by default and Perses can't `mkdir` its sub-folders inside them.
    # `user:` runs the container as root so the initial mkdir succeeds;
    # the binary then writes as root, which is fine inside the container.
    user: "0:0"
    expose:
      - "8080"
    volumes:
      - ./perses/config.yaml:/etc/perses/config.yaml:ro
      - ./perses/provisioning:/etc/perses/provisioning:ro
      - ./observability/perses:/etc/perses/dashboards:ro
      - perses_data:/var/lib/perses
    command:
      - "--config=/etc/perses/config.yaml"
    networks:
      - platform
    # No healthcheck: the persesdev image is minimal (no wget/curl) and
    # the binary doesn't expose a healthcheck subcommand. End-to-end
    # health is observed via Caddy / browser hits to dashboards.platform.

  # -------------------------------------------------------------------
  # oauth2-proxy — authentication gateway in front of all operator-
  # facing vhosts (logs/alerts/dashboards + the platform apex).
  #
  # Provider: GitHub. The OAuth App "FMD Platform Observability" is
  # registered under the FagorHealthcare GitHub organization; Client
  # ID/Secret are stored in /root/platform-credentials.txt on the
  # droplet and exported into .env at cloud-init time.
  #
  # Access policy: explicit email allowlist (./oauth2-proxy/emails.txt),
  # one address per line. To add an operator, append a line and run
  #   docker compose kill -s HUP oauth2-proxy
  # The container reloads the file without losing in-flight sessions.
  #
  # Cookie scope: .platform.fmd.fagorhealthcare.com — a single login
  # at the apex grants access to every subdomain (SSO).
  #
  # Why GitHub (and not Microsoft/Google):
  # Fagor Healthcare's corporate IdP isn't confirmed yet. GitHub is
  # an interim choice because every operator (gailen/fagorhealthcare/
  # externos) already has an account, MFA is inherited from GitHub,
  # and switching providers is a 3-flag change on this container — no
  # other piece of the stack touches identity.
  # See docs/observability-AUTH.md for the migration plan.
  # -------------------------------------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    env_file: .env
    expose:
      - "4180"
    # No `volumes:` block — the FagorHealthcare GitHub org IS the
    # source of truth for who can log in. Add/remove people via
    # https://github.com/orgs/FagorHealthcare/people; the proxy
    # picks up the change on the next login attempt (the failed
    # attempt would already get 403 if removed mid-session).
    command:
      - --provider=github
      - --client-id=${OAUTH2_CLIENT_ID}
      - --client-secret=${OAUTH2_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_COOKIE_SECRET}
      # Cookie domain without the leading dot — RFC 6265 superseded the
      # legacy ".domain.tld" convention. oauth2-proxy v7+ warns loudly
      # ("request host did not match any of the specific cookie domains")
      # if you ship the dotted form. Modern browsers still set the cookie
      # for all subdomains when domain= is given.
      - --cookie-domain=platform.fmd.fagorhealthcare.com
      - --cookie-secure=true
      - --cookie-samesite=lax
      # Trust requests coming from Caddy on the platform bridge.
      - --reverse-proxy=true
      - --whitelist-domain=.platform.fmd.fagorhealthcare.com
      - --redirect-url=https://platform.fmd.fagorhealthcare.com/oauth2/callback
      # Bind on every interface inside the container so Caddy can reach
      # us as oauth2-proxy:4180 from the bridge network.
      - --http-address=0.0.0.0:4180
      # Tell oauth2-proxy these requests came in via HTTPS so its
      # generated redirects use https:// not http://.
      - --force-https=false
      - --skip-provider-button=true
      # Authentication is gated by GitHub org membership ONLY
      # (--github-org below). No per-email allowlist — see the
      # comments above the service block.
      #
      # oauth2-proxy v7 still REQUIRES some form of email validation
      # to be declared, even when access policy is driven by another
      # mechanism (org/group membership). `--email-domain=*` is the
      # canonical "accept any email"; without it the proxy refuses to
      # start with "missing setting for email validation".
      - --email-domain=*
      #
      # To revert to a per-email allowlist later, add back:
      #   - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
      # and the matching volume mount.
      # Scopes:
      #   read:user — public profile
      #   user:email — required when the GitHub primary email is
      #     marked private (otherwise proxy can't read it and the
      #     allowlist check fails with an opaque 403)
      #   read:org — REQUIRED when --github-org is set; the proxy
      #     uses GET /user/orgs to verify membership and that
      #     endpoint refuses without this scope (returns 403
      #     "You need at least read:org scope or user scope").
      - --scope=read:user user:email read:org
      # Restrict to members of the FagorHealthcare org (defense-in-
      # depth on top of the email allowlist). Comment out if you ever
      # need to grant access without org membership.
      - --github-org=FagorHealthcare
      # Pass user identity downstream so Caddy can forward it to apps
      # that want to know who's logged in (no-op for our current set,
      # ready for the future MCP server).
      - --set-xauthrequest=true
      - --pass-access-token=false
      - --pass-authorization-header=false
      # Don't extend the session forever — re-auth weekly.
      - --cookie-expire=168h
      - --cookie-refresh=60m
    networks:
      - platform
