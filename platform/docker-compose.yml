# =====================================================================
# Platform-tier docker-compose stack.
#
# Runs on the dedicated Debian droplet provisioned by ../terraform/.
# Services:
#   - caddy : TLS edge (Let's Encrypt) for *.platform.fmd.fagorhealthcare.com
#   - zot   : OCI registry (LOCAL disk on droplet, Trivy CVE scanning;
#             nightly rclone mirror to DO Spaces handled by md-backup)
#   - loki  : log aggregator (S3 backend → DO Spaces, 365-day retention)
#
# Caddy is the ONLY service that publishes ports on the host. Zot and
# Loki are reachable only via the internal `platform` bridge network.
# Auth (htpasswd for Zot, basic-auth headers for Loki/Vector) is handled
# inside each service.
#
# Reference: docs/migration/06-platform-tier.md
# =====================================================================

networks:
  platform:
    driver: bridge

volumes:
  caddy_data:        # ACME certificates + state — persists across restarts
  caddy_config:      # Caddy autosaved/admin config
  loki_wal:          # Loki WAL + tsdb local index cache
  zot_rendered:      # Rendered (envsubst'd) zot config — written by init
  zot_data:          # OCI registry blobs + index. Local fs (CVE scanning
                     # requires real POSIX storage; S3 backend is rejected
                     # by Zot's validator). Mirrored nightly to Spaces by
                     # md-backup. See docs/migration/02-registry.md.

services:
  # -------------------------------------------------------------------
  # Caddy — TLS edge. Reverse-proxies registry. and logs. virtual hosts
  # to Zot/Loki on the internal bridge. ACME (HTTP-01) on ports 80/443.
  # -------------------------------------------------------------------
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - platform
    depends_on:
      zot:
        # Zot's published image is distroless (no wget/sh), so the only
        # honest gate we can apply here is "process started". Real health
        # is tested end-to-end via Caddy / curl from outside.
        condition: service_started
      loki:
        condition: service_healthy
    healthcheck:
      # Caddy's admin API listens on :2019 inside the container by default.
      test: ["CMD", "wget", "-q", "-O-", "--timeout=5", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------
  # zot-config-render — init container.
  #
  # Zot does NOT do environment-variable substitution on its config file
  # natively. We render zot/config.json.tmpl through `envsubst` (from the
  # gettext package) into a named volume that Zot then reads read-only.
  #
  # Trade-off accepted: an init container adds one more moving part vs.
  # baking a wrapper into a custom Zot image. The init-container path is
  # picked because it (a) keeps us on the upstream-published Zot image
  # with no rebuild step, and (b) makes the substitution mechanic
  # explicit in this compose file rather than hidden in a Dockerfile.
  # -------------------------------------------------------------------
  zot-config-render:
    image: alpine:3.20
    env_file: .env
    volumes:
      - ./zot/config.json.tmpl:/in/config.json.tmpl:ro
      - zot_rendered:/out
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache gettext >/dev/null
        envsubst < /in/config.json.tmpl > /out/config.json
        chmod 0444 /out/config.json
        echo "rendered /out/config.json"
    restart: "no"

  # -------------------------------------------------------------------
  # Zot — OCI registry. LOCAL disk storage on the droplet, htpasswd auth,
  # Trivy CVE scanning extension. Only reachable via Caddy.
  #
  # Why local instead of S3-direct: Zot's validator hard-rejects CVE
  # scanning whenever any storageDriver is set (root or any subPath),
  # because Trivy's DB needs a real POSIX filesystem. The maintainer-
  # recommended pattern is local disk + nightly rclone mirror to S3 for
  # durability. See pillar 02 (docs/migration/02-registry.md).
  # -------------------------------------------------------------------
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.5
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      # /etc/zot is rw because we mount htpasswd as a nested file inside it;
      # Docker cannot create a nested mountpoint underneath a :ro mount.
      # Zot itself does not write to /etc/zot at runtime.
      - zot_rendered:/etc/zot
      - ./zot/htpasswd:/etc/zot/htpasswd:ro
      # Registry blobs live here — backed up nightly to Spaces by
      # md-spaces-mirror-cronjob. Capacity: ~30 GB on a 80 GB droplet
      # disk leaves ample headroom.
      - zot_data:/var/lib/registry
    networks:
      - platform
    depends_on:
      zot-config-render:
        condition: service_completed_successfully
    # No healthcheck: the upstream zot image is distroless (no wget/sh,
    # no curl). End-to-end health is monitored externally via Caddy.

  # -------------------------------------------------------------------
  # Loki — monolithic mode. S3-backed chunks (DO Spaces), tsdb index
  # local-then-shipped, 365-day retention via compactor. Only reachable
  # via Caddy.
  # -------------------------------------------------------------------
  loki:
    image: grafana/loki:3.5.5
    restart: unless-stopped
    env_file: .env
    command:
      - "-config.file=/etc/loki/local-config.yaml"
      - "-config.expand-env=true"
    expose:
      - "3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_wal:/loki
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "--timeout=5", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
