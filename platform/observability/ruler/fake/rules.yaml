groups:
- name: observability-pre
  interval: 1m
  rules:
  - alert: ActualizacionTimeoutSpikePre
    expr: |-
      sum by (cluster) (
        rate({cluster="pre", container="controller"}
             |~ "actualizacion"
             | json
             | status="504" [5m])
      ) > 0.02
    for: 5m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: Timeouts on /vN/actualizacion in pre exceed 0.02 req/s for 5m
      description: |-
        Tasa de timeouts del ingress sobre los endpoints /actualizacion.
        Los servidores son NodeRed flows que persisten en Google Sheets;
        un 503 transitorio de Sheets API sobre la hoja NOTICIAS deja
        colgado el flow hasta que nginx corta a los 60 s. Ver el
        análisis completo en docs/INCIDENTS.md (entrada 2026-05-08) y
        los detalles arquitecturales en docs/loki/queries.md
        (sección "Investigación 2026-05-08 — Hallazgo A").
      runbook: docs/loki/queries.md
