# GENERATED by platform/observability/render.py — do not edit.
# Source: platform/observability/queries/<cluster>/*.yaml

groups:
- name: observability-pre
  interval: 1m
  rules:
  - alert: ActualizacionTimeoutSpikePre
    expr: |-
      sum by (cluster) (
        rate({cluster="pre", container="controller"}
             |~ "actualizacion"
             | json
             | status="504" [5m])
      ) > 0.02
    for: 5m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: Timeouts on /vN/actualizacion in pre exceed 0.02 req/s for 5m
      description: |-
        Tasa de timeouts del ingress sobre los endpoints /actualizacion.
        Los servidores son NodeRed flows que persisten en Google Sheets;
        un 503 transitorio de Sheets API sobre la hoja NOTICIAS deja
        colgado el flow hasta que nginx corta a los 60 s. Ver el
        análisis completo en docs/INCIDENTS.md (entrada 2026-05-08) y
        los detalles arquitecturales en docs/loki/queries.md
        (sección "Investigación 2026-05-08 — Hallazgo A").
      runbook: docs/loki/queries.md
  - alert: MdCoreRequestFailedBurstPre
    expr: |-
      sum(rate({cluster="pre", container="md-core"}
               |= "Request failed" [5m])) > 0.01
    for: 2m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: md-core "Request failed" sostenido > 3 errores/5min en pre
      description: |-
        Cuenta las líneas de log de md-core con el mensaje exacto
        "Request failed". Es el envoltorio que md-core mete cada vez que un
        endpoint HTTP devuelve un 5xx — el cliente más visible en los datos
        de hoy es /shc/event con `IntakeNotFoundException` para pacientes
        con desync entre SHC y backend.

        Baseline observado el 2026-05-08: 9 líneas en 12 h
        (~0.0002 req/s = ~0.0125/min). El umbral está calibrado para que
        el alert dispare cuando aparecen 3 o más en 5 min — patrón típico
        de un blister/treatment concreto que se está machacando.
      runbook: docs/loki/queries.md
  - alert: MdCoreErrorBurstPre
    expr: |-
      sum(rate({cluster="pre", container="md-core"}
               |~ "(?i)error|exception" [5m])) > 0.02
    for: 2m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: md-core errores/excepciones > 6/5min sostenido en pre
      description: |-
        Tasa de líneas de md-core que contienen "error" o "exception"
        (case-insensitive). Captura todo el espectro: stack traces, `Request
        failed`, "No programming found for device", parsing errors, etc.

        Baseline observado el 2026-05-08: 44 líneas en 12 h
        (~0.001 req/s = ~0.061/min = ~3.7/h). Umbral calibrado para
        ~20x baseline (6 errores en 5 min sostenido 2 min): no dispara con
        el ruido habitual, sí dispara cuando hay un cluster real de errores
        como el de la ventana 13:00-14:00 UTC del 8-May.
      runbook: docs/loki/queries.md
