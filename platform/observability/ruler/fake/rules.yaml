# GENERATED by platform/observability/render.py — do not edit.
# Source: platform/observability/queries/<cluster>/*.yaml

groups:
- name: observability-pre
  interval: 1m
  rules:
  - alert: ActualizacionTimeoutSpikePre
    expr: |-
      sum by (cluster) (
        rate({cluster="pre", container="controller"}
             |~ "actualizacion"
             | json
             | status="504" [5m])
      ) > 0.02
    for: 5m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: Timeouts on /vN/actualizacion in pre exceed 0.02 req/s for 5m
      description: |-
        Tasa de timeouts del ingress sobre los endpoints /actualizacion.
        Los servidores son NodeRed flows que persisten en Google Sheets;
        un 503 transitorio de Sheets API sobre la hoja NOTICIAS deja
        colgado el flow hasta que nginx corta a los 60 s. Ver el
        análisis completo en docs/INCIDENTS.md (entrada 2026-05-08) y
        los detalles arquitecturales en docs/loki/queries.md
        (sección "Investigación 2026-05-08 — Hallazgo A").
      runbook: docs/loki/queries.md
  - alert: MdCoreQuartzErrorAggravationPre
    expr: |-
      sum(rate({cluster="pre", container="md-core"}
               |~ "JobStoreCMT|ClusterManager|qrtz_|MisfireHandler|JobStoreSupport|QuartzScheduler" [5m])) > 0.1
    for: 5m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: md-core Quartz error rate disparado por encima del baseline conocido
      description: |-
        Tasa de errores procedentes de Quartz: ClusterManager check-in,
        MisfireHandler, JobStore lock acquisition. Originados por que las
        tablas qrtz_* no existen en la BD de pre — issue documentado en
        docs/INCIDENTS.md (entrada 2026-05-09).

        Baseline observado el 9-may: ~215 eventos/12h (~0.005 req/s).
        Umbral > 0.1 req/s ≈ 20x baseline: no dispara con el ruido
        conocido, sí dispara si Quartz se degrada todavía más (p.ej.
        caída de la BD que lo agrave o nuevos errores Hibernate
        encadenados).
      runbook: docs/INCIDENTS.md
  - alert: MdCoreIntakeReminderErrorPre
    expr: |-
      sum(rate({cluster="pre", container="md-core"}
               |~ "IntakeReminderNotificationJob" [5m])) > 0.01
    for: 2m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: md-core IntakeReminderNotificationJob fallando — pacientes pueden perder recordatorios
      description: |-
        Tasa de errores en el job de recordatorio de tomas. Crítico de
        negocio: cuando este job falla, pacientes pueden perder
        notificaciones WhatsApp/SMS de medicación.

        Baseline observado el 9-may: 11 eventos/12h. Umbral > 0.01 req/s
        (= 3 errores en 5 min) — fires en cualquier ráfaga real, no en
        el goteo ocasional.
      runbook: docs/loki/queries.md
  - alert: MdCoreNovelErrorBurstPre
    expr: |-
      sum(rate({cluster="pre", container="md-core"}
               |~ "(?i)error|exception"
               !~ "JobStoreCMT|ClusterManager|qrtz_|MisfireHandler|JobStoreSupport|QuartzScheduler|dailyReport SOLICITADO|PeriodicNotificationGenerator|IntakeReminderNotificationJob"
               [5m])) > 0.02
    for: 2m
    labels:
      severity: warning
      cluster: pre
    annotations:
      summary: md-core con errores NO catalogados sostenidos > 6/5min — algo nuevo se ha roto
      description: |-
        Tasa de errores/excepciones de md-core EXCLUYENDO las categorías
        conocidas:
          - Quartz infra (qrtz_* tables missing — ver INCIDENTS 2026-05-09)
          - dailyReport SOLICITADO not found (ruido de negocio)
          - IntakeReminderNotificationJob (tiene su propio alert)

        Esta es la red de seguridad: cuando aparece un error nuevo
        inesperado, dispara aquí. Por construcción, su baseline debería
        ser bajísimo — cualquier elevación sostenida indica que algo
        nuevo se ha roto.

        Baseline observado el 9-may: ~27 eventos/12h (~0.0006 req/s).
        Umbral > 0.02 req/s (= 6 en 5 min) ≈ 30x baseline.
      runbook: docs/loki/queries.md
