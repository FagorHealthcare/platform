id: md-core-error-rate
title: md-core errors/exceptions (req/s)
description: |
  Tasa de líneas de md-core que contienen "error" o "exception"
  (case-insensitive). Captura todo el espectro: stack traces, `Request
  failed`, "No programming found for device", parsing errors, etc.

  Baseline observado el 2026-05-08: 44 líneas en 12 h
  (~0.001 req/s = ~0.061/min = ~3.7/h). Umbral calibrado para
  ~20x baseline (6 errores en 5 min sostenido 2 min): no dispara con
  el ruido habitual, sí dispara cuando hay un cluster real de errores
  como el de la ventana 13:00-14:00 UTC del 8-May.
runbook: docs/loki/queries.md

cluster: pre

expr: |
  sum(rate({cluster="pre", container="md-core"}
           |~ "(?i)error|exception" [5m]))

unit: req/s

alert:
  name: MdCoreErrorBurstPre
  for: 2m
  condition: "> 0.02"
  severity: warning
  summary: md-core errores/excepciones > 6/5min sostenido en pre

panel:
  dashboard: pre-overview
  type: timeseries
  legend: md-core
  thresholds:
    - { value: 0.02, color: yellow }
    - { value: 0.10, color: red }
