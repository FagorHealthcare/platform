# Stable index of every query in the catalog.
#
# A query "graduates" from docs/loki/queries.md to a YAML file here when its
# LogQL kernel is stable enough to drive a panel and/or an alert. The cookbook
# entry then links to its catalog entry by id.
#
# Each id is permanent — renaming an id breaks alert history and dashboard
# permalinks. Add new ids; never repurpose old ones.
#
# Adding a query: drop a YAML under queries/<cluster>/<id>.yaml, register it
# here with a one-line summary, then run platform/observability/render.py.

queries:

  # ------ ingress / public-facing -----------------------------------
  - id: actualizacion-timeout-rate
    cluster: pre
    file: pre/actualizacion-timeout-rate.yaml
    summary: 504s on /vN/actualizacion (NodeRed → Google Sheets timeouts)
    motivated_by: incident 2026-05-08

  - id: ingress-status-rate
    cluster: pre
    file: pre/ingress-status-rate.yaml
    summary: ingress responses per HTTP status (panel-only)

  - id: actualizacion-failure-ratio
    cluster: pre
    file: pre/actualizacion-failure-ratio.yaml
    summary: ratio of /actualizacion 504s to total /actualizacion calls

  # ------ md-core breakdown by error category -----------------------
  # Categorize so we can tell apart known-noise from genuinely-new
  # signals. Catchall is `md-core-other-error-rate`.
  - id: md-core-quartz-error-rate
    cluster: pre
    file: pre/md-core-quartz-error-rate.yaml
    summary: Quartz JobStore errors (qrtz_* tables missing — see INCIDENTS 2026-05-09)

  - id: md-core-dailyreport-not-found-rate
    cluster: pre
    file: pre/md-core-dailyreport-not-found-rate.yaml
    summary: PeriodicNotificationGenerator "dailyReport SOLICITADO" not-found rate (panel)

  - id: md-core-intake-reminder-error-rate
    cluster: pre
    file: pre/md-core-intake-reminder-error-rate.yaml
    summary: IntakeReminderNotificationJob errors (medication reminder failures)

  - id: md-core-other-error-rate
    cluster: pre
    file: pre/md-core-other-error-rate.yaml
    summary: catchall for md-core errors NOT in the categorized buckets above

  - id: md-core-request-failed-rate
    cluster: pre
    file: pre/md-core-request-failed-rate.yaml
    summary: md-core "Request failed" rate (panel only — covered by other-error alert)

  - id: md-core-no-programming-rate
    cluster: pre
    file: pre/md-core-no-programming-rate.yaml
    summary: md-core "No programming found for device" rate (under-characterized pattern)

  # ------ overall liveness / cross-cutting --------------------------
  - id: log-volume-by-container
    cluster: pre
    file: pre/log-volume-by-container.yaml
    summary: log lines/s per container (panel-only — overall liveness)

  # ------ business metrics (dashboard pre-business) -----------------
  # Derived from md-core log line patterns. Panel-only first iteration —
  # alerts to be added once baselines are established (1-2 weeks of obs).
  - id: intake-confirmation-rate
    cluster: pre
    file: pre/intake-confirmation-rate.yaml
    summary: tomas confirmadas vía SHC físico (adherencia)

  - id: intake-missed-rate
    cluster: pre
    file: pre/intake-missed-rate.yaml
    summary: tomas marcadas como olvidadas tras cerrarse la ventana

  - id: whatsapp-outbound-rate
    cluster: pre
    file: pre/whatsapp-outbound-rate.yaml
    summary: mensajes WhatsApp salientes (Twilio)

  - id: daily-reports-requested
    cluster: pre
    file: pre/daily-reports-requested.yaml
    summary: informes diarios solicitados por md-core

  - id: patient-onboarding-events
    cluster: pre
    file: pre/patient-onboarding-events.yaml
    summary: tokens de activación + asignaciones de dispositivo
